name: Community CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  repository-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject private commercial material
        run: python backend/scripts/check_no_secrets_tracked.py

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements-lock.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements-lock.txt
      - name: Install Chromium
        run: playwright install --with-deps chromium
      - name: Run backend tests
        run: PYTHONPATH=backend pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Production build
        run: npm run build
